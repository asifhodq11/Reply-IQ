# ============================================================
# ReplyIQ Backend — Flake8 + Pytest Config
# ============================================================

[flake8]
max-line-length = 120
exclude =
    .venv,
    __pycache__,
    .git,
    build,
    dist
# E501: line too long (handled by max-line-length)
# W503: line break before binary operator (black disagrees with flake8 here)
extend-ignore = W503

[tool:pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --cov=app
    --cov-fail-under=70
